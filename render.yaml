databases:
  - name: katenadep-db
    plan: free
    databaseName: katenadep
    user: katenadep

services:
  - type: web
    name: katenadep
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production node dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: katenadep-db
          property: connectionString
